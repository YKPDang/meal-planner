services:
  backend:
    build: ./backend
    container_name: meal-planner-backend
    environment:
      - DATABASE_PATH=/data/meal_planner.db
      - SMART_RANDOM_LOOKBACK_DAYS=7
    volumes:
      - meal_planner_data:/data

  frontend:
    build: ./frontend
    container_name: meal-planner-frontend
    environment:
      - VITE_API_URL=/api
      - VITE_ALLOWED_HOSTS=localhost,127.0.0.1,quasar.wan.walzen.org
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  meal_planner_data:
