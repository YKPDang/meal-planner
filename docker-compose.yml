services:
  backend:
    build: ./backend
    container_name: meal-planner-backend
    environment:
      - DATABASE_PATH=/data/meal_planner.db
      - SMART_RANDOM_LOOKBACK_DAYS=7
    volumes:
      - meal_planner_data:/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: meal-planner-frontend
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  meal_planner_data:
