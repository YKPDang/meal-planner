services:
  backend:
    image: ghcr.io/${GHCR_OWNER:-<owner>}/meal-planner-backend:latest
    container_name: meal-planner-backend
    environment:
      - DATABASE_PATH=/data/meal_planner.db
      - SMART_RANDOM_LOOKBACK_DAYS=7
    volumes:
      - meal_planner_data:/data

  frontend:
    image: ghcr.io/${GHCR_OWNER:-<owner>}/meal-planner-frontend:latest
    container_name: meal-planner-frontend
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  meal_planner_data:
